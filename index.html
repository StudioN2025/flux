<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flux Messenger - Зашифрованный P2P мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <div id="auth-screen" class="screen active">
            <div class="container">
                <div class="logo">
                    <div class="logo-icon">⚡</div>
                    <h1>Flux Messenger</h1>
                    <p>🔒 Полностью зашифрованный P2P мессенджер</p>
                </div>
                <div class="auth-form">
                    <input type="text" id="username" placeholder="Имя пользователя" autocomplete="off">
                    <input type="password" id="password" placeholder="Пароль">
                    <button id="login-btn" class="btn-primary">Войти</button>
                    <button id="register-btn" class="btn-secondary">Зарегистрироваться</button>
                </div>
                <div id="auth-error" class="error-message"></div>
            </div>
        </div>

        <!-- Основной экран мессенджера -->
        <div id="messenger-screen" class="screen">
            <div class="messenger-container">
                <!-- Боковая панель -->
                <div class="sidebar">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">👤</div>
                        <div class="user-details">
                            <div class="username" id="current-user"></div>
                            <div class="user-code-container">
                                <span class="user-code-label">🔑 Ваш код:</span>
                                <div class="code-wrapper">
                                    <span class="user-code" id="user-code">••••-••••-••••</span>
                                    <button class="toggle-code-btn" id="toggle-code-btn" title="Показать/скрыть код">👁️</button>
                                    <button class="copy-code-btn" id="copy-code-btn" title="Скопировать код">📋</button>
                                </div>
                            </div>
                            <div class="status" id="user-status">Офлайн</div>
                        </div>
                        <button id="logout-btn" class="icon-btn">🚪</button>
                    </div>
                    
                    <!-- Кнопка добавления контакта -->
                    <div class="add-contact">
                        <button id="add-contact-btn" class="btn-add-contact">➕ Добавить контакт по коду</button>
                    </div>
                    
                    <!-- Список контактов -->
                    <div class="contacts-header">
                        <span>📱 Контакты</span>
                        <span class="contacts-count" id="contacts-count">0</span>
                    </div>
                    <div class="contacts-list" id="contacts-list">
                        <div class="empty-contacts">
                            <div>📭</div>
                            <div>Нет контактов</div>
                            <div class="empty-hint">Нажмите "Добавить контакт" или напишите кому-нибудь</div>
                        </div>
                    </div>
                </div>

                <!-- Основная область чата -->
                <div class="chat-area">
                    <div class="chat-header" id="chat-header">
                        <div class="chat-user-info">
                            <div class="chat-avatar">👤</div>
                            <div class="chat-user-details">
                                <div class="chat-username" id="chat-username">Выберите чат</div>
                                <div class="chat-code-container">
                                    <span class="chat-code-label">🔑 Код:</span>
                                    <span class="chat-code" id="chat-code"></span>
                                    <button class="copy-chat-code-btn" id="copy-chat-code-btn" style="display: none;">📋</button>
                                </div>
                                <div class="chat-status" id="chat-status">Не в сети</div>
                            </div>
                        </div>
                        <div class="call-controls">
                            <button id="audio-call-btn" class="icon-btn" disabled>🎤</button>
                            <button id="video-call-btn" class="icon-btn" disabled>📹</button>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messages-container">
                        <div class="messages" id="messages"></div>
                    </div>
                    
                    <div class="input-area">
                        <button id="file-btn" class="icon-btn">📎</button>
                        <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
                        <button id="send-btn" class="btn-send" disabled>📨</button>
                    </div>
                </div>

                <!-- Панель звонка -->
                <div id="call-panel" class="call-panel hidden">
                    <div class="call-container">
                        <div class="local-video-container">
                            <video id="local-video" autoplay muted playsinline></video>
                        </div>
                        <div class="remote-video-container">
                            <video id="remote-video" autoplay playsinline></video>
                        </div>
                        <div class="call-controls-panel">
                            <button id="mute-audio-btn" class="call-btn">🎤</button>
                            <button id="mute-video-btn" class="call-btn">📹</button>
                            <button id="end-call-btn" class="call-btn end-call">🔴</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для добавления контакта -->
    <div id="add-contact-modal" class="modal hidden">
        <div class="modal-content">
            <h3>➕ Добавить контакт</h3>
            <input type="text" id="contact-code-input" placeholder="XXXX-XXXX-XXXX" maxlength="14" autocomplete="off">
            <div class="modal-buttons">
                <button id="modal-add-btn" class="btn-primary">Добавить</button>
                <button id="modal-add-close-btn" class="btn-secondary">Отмена</button>
            </div>
            <div id="modal-add-error" class="error-message"></div>
        </div>
    </div>

    <!-- Уведомление -->
    <div id="copy-toast" class="toast hidden">✅ Код скопирован!</div>

    <style>
        .add-contact { padding: 15px; border-bottom: 1px solid #e0e0e0; }
        .btn-add-contact { width: 100%; padding: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-add-contact:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(102,126,234,0.3); }
        .contacts-header { padding: 12px 15px; background: #f8f9fa; font-size: 12px; font-weight: 600; color: #495057; display: flex; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
        .contacts-count { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2px 8px; border-radius: 12px; font-size: 10px; }
        .contacts-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; border-bottom: 1px solid #f0f0f0; }
        .contact-item:hover { background: #f8f9fa; transform: translateX(2px); }
        .contact-item.active { background: linear-gradient(90deg, #e3f2fd 0%, #fff 100%); border-left: 3px solid #667eea; }
        .contact-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; flex-shrink: 0; }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: #2c3e50; }
        .contact-code-small { font-size: 10px; color: #667eea; font-family: monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .contact-status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .contact-status.online { background: #4caf50; animation: pulse-green 1.5s infinite; }
        .contact-status.offline { background: #9e9e9e; }
        @keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); } 50% { box-shadow: 0 0 0 4px rgba(76, 175, 80, 0); } }
        .empty-contacts { text-align: center; padding: 50px 20px; color: #adb5bd; }
        .empty-contacts div:first-child { font-size: 56px; margin-bottom: 12px; opacity: 0.5; }
        .empty-hint { font-size: 11px; margin-top: 12px; color: #ced4da; }
        .code-wrapper { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .toggle-code-btn { background: none; border: none; font-size: 12px; cursor: pointer; padding: 3px 6px; border-radius: 4px; color: #666; }
        .toggle-code-btn:hover { background: #e0e0e0; }
        .user-code { font-family: monospace; font-size: 12px; font-weight: 600; color: #667eea; background: #f0f0f0; padding: 4px 8px; border-radius: 6px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        .user-code.hidden-code { filter: blur(4px); background: #e0e0e0; }
        .user-code.visible-code { filter: none; }
        .chat-code { font-size: 10px; color: #667eea; font-family: monospace; cursor: pointer; }
        .chat-code:hover { text-decoration: underline; }
        .modal-content input { text-transform: uppercase; font-family: monospace; text-align: center; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 3000; animation: fadeIn 0.3s; white-space: nowrap; }
        .toast.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>

    <script type="module" src="app.js"></script>
</body>
</html>
