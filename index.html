<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flux Messenger - Зашифрованный P2P мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <div id="auth-screen" class="screen active">
            <div class="container">
                <div class="logo">
                    <div class="logo-icon">⚡</div>
                    <h1>Flux Messenger</h1>
                    <p>🔒 Полностью зашифрованный P2P мессенджер</p>
                </div>
                <div class="auth-form">
                    <input type="text" id="username" placeholder="Имя пользователя" autocomplete="off">
                    <input type="password" id="password" placeholder="Пароль">
                    <button id="login-btn" class="btn-primary">Войти</button>
                    <button id="register-btn" class="btn-secondary">Зарегистрироваться</button>
                </div>
                <div id="auth-error" class="error-message"></div>
            </div>
        </div>

        <!-- Основной экран мессенджера -->
        <div id="messenger-screen" class="screen">
            <div class="messenger-container">
                <!-- Боковая панель -->
                <div class="sidebar">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">👤</div>
                        <div class="user-details">
                            <div class="username" id="current-user"></div>
                            <div class="user-code-container">
                                <span class="user-code-label">🔑 Ваш код:</span>
                                <span class="user-code" id="user-code"></span>
                                <button class="copy-code-btn" id="copy-code-btn" title="Скопировать код">📋</button>
                            </div>
                            <div class="status" id="user-status">Офлайн</div>
                        </div>
                        <button id="logout-btn" class="icon-btn">🚪</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="search-users" placeholder="Поиск по имени или коду...">
                        <button id="search-by-code-btn" class="search-code-btn" title="Поиск по коду">🔍</button>
                    </div>
                    <div class="users-list" id="users-list">
                        <!-- Список пользователей будет здесь -->
                    </div>
                </div>

                <!-- Основная область чата -->
                <div class="chat-area">
                    <div class="chat-header" id="chat-header">
                        <div class="chat-user-info">
                            <div class="chat-avatar">👤</div>
                            <div class="chat-user-details">
                                <div class="chat-username" id="chat-username">Выберите чат</div>
                                <div class="chat-code" id="chat-code"></div>
                                <div class="chat-status" id="chat-status">Не в сети</div>
                            </div>
                        </div>
                        <div class="call-controls">
                            <button id="audio-call-btn" class="icon-btn" disabled>🎤</button>
                            <button id="video-call-btn" class="icon-btn" disabled>📹</button>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messages-container">
                        <div class="messages" id="messages">
                            <!-- Сообщения будут здесь -->
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <button id="file-btn" class="icon-btn">📎</button>
                        <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
                        <button id="send-btn" class="btn-send" disabled>📨</button>
                    </div>
                </div>

                <!-- Панель звонка -->
                <div id="call-panel" class="call-panel hidden">
                    <div class="call-container">
                        <div class="local-video-container">
                            <video id="local-video" autoplay muted playsinline></video>
                        </div>
                        <div class="remote-video-container">
                            <video id="remote-video" autoplay playsinline></video>
                        </div>
                        <div class="call-controls-panel">
                            <button id="mute-audio-btn" class="call-btn">🎤</button>
                            <button id="mute-video-btn" class="call-btn">📹</button>
                            <button id="end-call-btn" class="call-btn end-call">🔴</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для поиска по коду -->
    <div id="code-search-modal" class="modal hidden">
        <div class="modal-content">
            <h3>🔍 Поиск по коду</h3>
            <input type="text" id="code-input" placeholder="Введите 12-значный код" maxlength="14" autocomplete="off">
            <div class="modal-buttons">
                <button id="modal-search-btn" class="btn-primary">Найти</button>
                <button id="modal-close-btn" class="btn-secondary">Закрыть</button>
            </div>
            <div id="modal-error" class="error-message"></div>
        </div>
    </div>

    <!-- Уведомление о копировании -->
    <div id="copy-toast" class="toast hidden">
        ✅ Код скопирован!
    </div>

    <style>
        .user-code-container {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 5px 0;
            flex-wrap: wrap;
        }
        
        .user-code-label {
            font-size: 10px;
            color: #666;
        }
        
        .user-code {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            color: #667eea;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .user-code:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        
        .copy-code-btn {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.3s;
            color: #666;
        }
        
        .copy-code-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }
        
        .copy-code-btn:active {
            transform: scale(0.95);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 3000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }
        
        .toast.hidden {
            display: none;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .chat-code {
            font-size: 10px;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }
        
        .search-code-btn {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.3s;
        }
        
        .search-code-btn:hover {
            background: #f0f0f0;
        }
        
        .modal-content input {
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
    </style>

    <script type="module" src="app.js"></script>
</body>
</html>
