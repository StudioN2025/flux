<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flux Messenger - Зашифрованный P2P мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <div id="auth-screen" class="screen active">
            <div class="container">
                <div class="logo">
                    <div class="logo-icon">⚡</div>
                    <h1>Flux Messenger</h1>
                    <p>🔒 Полностью зашифрованный P2P мессенджер</p>
                </div>
                <div class="auth-form">
                    <input type="text" id="username" placeholder="Имя пользователя" autocomplete="off">
                    <input type="password" id="password" placeholder="Пароль">
                    <button id="login-btn" class="btn-primary">Войти</button>
                    <button id="register-btn" class="btn-secondary">Зарегистрироваться</button>
                </div>
                <div id="auth-error" class="error-message"></div>
            </div>
        </div>

        <!-- Основной экран мессенджера -->
        <div id="messenger-screen" class="screen">
            <div class="messenger-container">
                <!-- Боковая панель -->
                <div class="sidebar">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">👤</div>
                        <div class="user-details">
                            <div class="username" id="current-user"></div>
                            <div class="user-code-container">
                                <span class="user-code-label">🔑 Ваш код:</span>
                                <div class="code-wrapper">
                                    <span class="user-code" id="user-code">••••-••••-••••</span>
                                    <button class="toggle-code-btn" id="toggle-code-btn" title="Показать/скрыть код">👁️</button>
                                    <button class="copy-code-btn" id="copy-code-btn" title="Скопировать код">📋</button>
                                </div>
                            </div>
                            <div class="status" id="user-status">Офлайн</div>
                        </div>
                        <button id="logout-btn" class="icon-btn">🚪</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="search-users" placeholder="Поиск по имени или коду...">
                        <button id="search-by-code-btn" class="search-code-btn" title="Поиск по коду">🔍</button>
                    </div>
                    <div class="users-list" id="users-list"></div>
                </div>

                <!-- Основная область чата -->
                <div class="chat-area">
                    <div class="chat-header" id="chat-header">
                        <div class="chat-user-info">
                            <div class="chat-avatar">👤</div>
                            <div class="chat-user-details">
                                <div class="chat-username" id="chat-username">Выберите чат</div>
                                <div class="chat-code-container">
                                    <span class="chat-code-label">🔑 Код:</span>
                                    <span class="chat-code" id="chat-code"></span>
                                    <button class="copy-chat-code-btn" id="copy-chat-code-btn" style="display: none;">📋</button>
                                </div>
                                <div class="chat-status" id="chat-status">Не в сети</div>
                            </div>
                        </div>
                        <div class="call-controls">
                            <button id="audio-call-btn" class="icon-btn" disabled>🎤</button>
                            <button id="video-call-btn" class="icon-btn" disabled>📹</button>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messages-container">
                        <div class="messages" id="messages"></div>
                    </div>
                    
                    <div class="input-area">
                        <button id="file-btn" class="icon-btn">📎</button>
                        <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
                        <button id="send-btn" class="btn-send" disabled>📨</button>
                    </div>
                </div>

                <!-- Панель звонка -->
                <div id="call-panel" class="call-panel hidden">
                    <div class="call-container">
                        <div class="local-video-container">
                            <video id="local-video" autoplay muted playsinline></video>
                        </div>
                        <div class="remote-video-container">
                            <video id="remote-video" autoplay playsinline></video>
                        </div>
                        <div class="call-controls-panel">
                            <button id="mute-audio-btn" class="call-btn">🎤</button>
                            <button id="mute-video-btn" class="call-btn">📹</button>
                            <button id="end-call-btn" class="call-btn end-call">🔴</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для поиска по коду -->
    <div id="code-search-modal" class="modal hidden">
        <div class="modal-content">
            <h3>🔍 Поиск по коду</h3>
            <input type="text" id="code-input" placeholder="XXXX-XXXX-XXXX" maxlength="14" autocomplete="off">
            <div class="modal-buttons">
                <button id="modal-search-btn" class="btn-primary">Найти</button>
                <button id="modal-close-btn" class="btn-secondary">Закрыть</button>
            </div>
            <div id="modal-error" class="error-message"></div>
        </div>
    </div>

    <!-- Уведомление о копировании -->
    <div id="copy-toast" class="toast hidden">✅ Код скопирован!</div>

    <style>
        .code-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .toggle-code-btn {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 4px;
            transition: all 0.2s;
            color: #666;
        }
        
        .toggle-code-btn:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        
        .chat-code-container {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 2px 0;
            flex-wrap: wrap;
        }
        
        .chat-code-label {
            font-size: 10px;
            color: #888;
        }
        
        .chat-code {
            font-size: 10px;
            color: #667eea;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            cursor: pointer;
        }
        
        .chat-code:hover {
            text-decoration: underline;
        }
        
        .copy-chat-code-btn {
            background: none;
            border: none;
            font-size: 10px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            color: #666;
        }
        
        .copy-chat-code-btn:hover {
            background: #e0e0e0;
        }
        
        .user-code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 6px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .user-code.hidden-code {
            filter: blur(4px);
            background: #e0e0e0;
            cursor: pointer;
        }
        
        .user-code.hidden-code:hover {
            filter: blur(2px);
        }
        
        .user-code.visible-code {
            filter: none;
        }
        
        .user-code-container {
            margin: 5px 0;
        }
        
        .code-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
    </style>

    <script type="module" src="app.js"></script>
</body>
</html>
